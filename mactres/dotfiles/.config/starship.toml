# ===============================================
# Starship Prompt - Clean Developer Config (2026)
# Tailored for Neovim + general dev work
# ===============================================

format = """$username$hostname$directory$git_branch$git_status$python$nodejs$golang$rust$cmd_duration$line_break$character"""

# ── Left Prompt ─────────────────────────────────────

[username]
show_always = false
style_user = "bold green"

[hostname]
ssh_only = true
style = "bold green"

[directory]
style = "bold blue"
truncation_length = 4
truncation_symbol = "…/"
read_only = " 🔒"

# ── Git ─────────────────────────────────────────────

[git_branch]
style = "bold purple"
symbol = " "

[git_status]
style = "bold red"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↑${ahead_count}↓${behind_count}"
modified = "!"
deleted = "✘"
untracked = "?"
staged = "+"

# ── Languages ───────────────────────────────────────

[python]
symbol = "🐍 "
style = "bold yellow"

[nodejs]
symbol = "⬢ "
style = "bold green"

[golang]
symbol = "🐹 "
style = "bold cyan"

[rust]
symbol = "🦀 "
style = "bold red"

# ── Other ───────────────────────────────────────────

[cmd_duration]
format = " [$duration]($style) "
style = "bold yellow"
min_time = 2000

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
